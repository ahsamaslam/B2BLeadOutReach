version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: b2b-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: b2b_leads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: b2b-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: b2b-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/b2b_leads
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      CAPSOLVER_API_KEY: ${CAPSOLVER_API_KEY:-}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY:-}
      GOOGLE_CSE_CX: ${GOOGLE_CSE_CX:-}
      PLATFORM_FROM_EMAIL: ${PLATFORM_FROM_EMAIL:-sales@unionlogix.com}
      PLATFORM_FROM_NAME: ${PLATFORM_FROM_NAME:-SendMaster}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-}
      TRACKING_BASE_URL: ${TRACKING_BASE_URL:-}
      TRACKING_ENABLED: ${TRACKING_ENABLED:-true}
      ALLOWED_ORIGINS: "*"
      MY_COMPANY_NAME: ${MY_COMPANY_NAME:-Union Logix}
      MY_COMPANY_SERVICES: ${MY_COMPANY_SERVICES:-AI and Automation}
      MY_COMPANY_VALUE_PROP: ${MY_COMPANY_VALUE_PROP:-We help reduce costs with AI automation}
      MY_COMPANY_WEBSITE: ${MY_COMPANY_WEBSITE:-https://unionlogix.com}
      MY_COMPANY_CONTACT: ${MY_COMPANY_CONTACT:-sales@unionlogix.com}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      LINKEDIN_REDIRECT_URI: ${LINKEDIN_REDIRECT_URI:-http://localhost:8000/api/linkedin/callback}
    volumes:
      - portfolio_uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    container_name: b2b-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: b2b-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  portfolio_uploads:
