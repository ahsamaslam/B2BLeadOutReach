version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: b2b-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: b2b_leads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: b2b-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: b2b-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/b2b_leads
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      CAPSOLVER_API_KEY: ${CAPSOLVER_API_KEY:-}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY:-}
      GOOGLE_CSE_CX: ${GOOGLE_CSE_CX:-}
      SMTP_HOST: smtp.hostinger.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Union Logix}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ALLOWED_ORIGINS: http://localhost:3000
      MY_COMPANY_NAME: ${MY_COMPANY_NAME:-Union Logix}
      MY_COMPANY_SERVICES: ${MY_COMPANY_SERVICES:-AI and Automation}
      MY_COMPANY_VALUE_PROP: ${MY_COMPANY_VALUE_PROP:-We help reduce costs with AI automation}
      MY_COMPANY_WEBSITE: ${MY_COMPANY_WEBSITE:-https://unionlogix.com}
      MY_COMPANY_CONTACT: ${MY_COMPANY_CONTACT:-sales@unionlogix.com}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      LINKEDIN_REDIRECT_URI: ${LINKEDIN_REDIRECT_URI:-http://localhost:8000/api/linkedin/callback}
    volumes:
      - portfolio_uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: b2b-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  portfolio_uploads:
